name: Add links

on:
  workflow_dispatch:
    inputs:
      links:
        description: "One or more space-separated URLs. Optional: URL | title | description"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: add-links-${{ github.ref }}
  cancel-in-progress: false

jobs:
  add:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generate posts
        env:
          LINKS: ${{ inputs.links }}
        run: python tools/add_links.py --urls-env LINKS
      - name: Commit and push
        run: |
          if [ -z "$(git status --porcelain -- docs/_posts)" ]; then
            echo "No new links to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/_posts
          git commit -m "content: add submitted links"
          git pull --rebase origin main
          git push origin HEAD:main
