<article class="post" id="{{ include.post.date | date: '%Y-%m-%d' }}-{{ include.post.slug }}">
  <span class="rec-indicator">REC ●</span>
  <p class="post-meta">{{ include.post.date | date: "%Y.%m.%d" }}</p>
  {% capture _snippet %}{% include post_snippet.html post=include.post %}{% endcapture %}
  <p>{{ _snippet }}</p>
  <a class="stretched-link" href="{{ include.post.url | relative_url }}" aria-label="Open post: {{ include.post.title }}"></a>
  <div class="post-footer">
    <span class="post-cta">View details →</span>
    <a class="post-map-link" href="{{ '/map.html' | relative_url }}?hl={{ include.post.url | relative_url | url_encode }}" aria-label="View this link in 3D map">3D map ↗</a>
  </div>
</article>
